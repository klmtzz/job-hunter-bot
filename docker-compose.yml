version: '3.8'

services:
  job-hunter-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_hunter_orchestrator
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
